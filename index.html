<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>JoinRace</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <main>

        <div class="swiper">
            
            <div class="swiper-wrapper">

                <!--1st Car-->

                <div class="swiper-slide first">

                    <div class="yellow"></div>
                    <div class="black"></div>

                    <div class="decagon decagon-black">

                        <a href="videos/video-1.mp4" target="_blank" class="play-btn play-yellow">
                        <i class="fas fa-play"></i>
                        </a>

                    </div>

                    <div class="content">

                        <div class="title">

                            <div class="small">Let's</div>

                            <div class="big">RACE</div>
                        </div>

                        <div class="image">
                        <img src="images/img-1.png" alt="Porsche 911">
                        </div>

                        <div class="specs">

                            <span><b>211</b> MPH</span>
                            <span><b>340</b> KMPH</span>
                            <span><b>392</b> KW</span>

                            <a href="https://www.porsche.com" class="discover-btn">
                            Discover Now <i class="fas fa-arrow-right"></i>
                            </a>

                        </div>

                        </div>

                    </div>

                <!-- 2nd car-->

                <div class="swiper-slide">

                    <div class="red"></div>
                    <div class="black"></div>

                    <div class="decagon decagon-black">

                        <a href="videos/video-2.mp4" target="_blank" class="play-btn play-darkred">
                        <i class="fas fa-play"></i>
                        </a>

                    </div>

                    <div class="content">

                        <div class="title">
                        <div class="small">Let's</div>
                        <div class="big">RACE</div>
                    </div>

                    <div class="image">
                    <img src="images/img-2.png" alt="Audi R8">
                </div>

                <div class="specs red-c">

                    <span><b>205</b> MPH</span>
                    <span><b>330</b> KMPH</span>
                    <span><b>462</b> KW</span>

                    <a href="https://www.audi.com" class="discover-btn red-c">
                    Discover Now <i class="fas fa-arrow-right"></i>
                    </a>

                </div>

                 </div>

        </div>

        <!-- 3rd car-->

                <div class="swiper-slide">

                <div class="blue"></div>
                <div class="black"></div>

                    <div class="decagon decagon-black">

                    <a href="videos/video-3.mp4" target="_blank" class="play-btn play-blue">
                    <i class="fas fa-play"></i>
                    </a>

                    </div>

                    <div class="content">

                    <div class="title">
                    <div class="small">Let's</div>
                    <div class="big">RACE</div>
                    </div>

                    <div class="image">
                    <img src="images/img-3.png" alt="Ferrari">
                    </div>

                    <div class="specs blue-c">

                        <span><b>218</b> MPH</span>
                        <span><b>351</b> KMPH</span>
                        <span><b>895</b> KW</span>

                    <a href="https://www.ferrari.com" class="discover-btn blue-c">
                    Discover Now <i class="fas fa-arrow-right"></i>
                    </a>

                    </div>

                     </div>

                        </div>

                        <div class="swiper-pagination"></div>

                </div>

    </main>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

<script>

    var swiper = new Swiper(".swiper", {

        direction: "vertical",
        slidesPerView: 1,
        spaceBetween: 30,
        mousewheel: true,
        effect: "coverflow",
        speed: 2000,

        coverflowEffect: {
        rotate: 50,
        stretch: 0,
        depth: 100,
        modifier: 1,
        slideShadows: true
        },

            pagination: {
            el: ".swiper-pagination",
            clickable: true,

            renderBullet: function (index, className) {

            return '<span class="' + className + '">' +
            '<span>' + String(index + 1).padStart(2, '0') +
            '</span></span>';

            }
        }

    });

    gsap.from(".first .yellow", { y: -1000, duration: 2 })
    gsap.from(".first .black", { y: 1000, duration: 2 })
    gsap.from(".first img", { x: 1000, duration: 2 })
    gsap.from(".first .small", { y: 100, opacity: 0, delay: 2.1 })

    gsap.from(".first .big", {
    y: 100,
    opacity: 0,
    stagger: 0.2,
    delay: 2.1
    })

</script>
</body>


</html>
