<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <main>
        <div class="swiper">
            <!--1st Car-->
            <div class="swiper-wrapper">
                <div class="swiper-slide first">

                    <div class="yellow"></div>
                    <div class="black"></div>
                    <div class="decagon decagon-black">
                        <a href="videos/video-1.mp4" target="_blank" class="play-btn play-yellow">
                            <i class="fas fa-play"></i>
                        </a>
                    </div>
                    <div class="content">
                        <div class="title">
                            <div class="small">Let's</div>
                            <div class="big">RACE</div>
                        </div>
                        <div class="image">
                            <img src="images/img-1.png" alt="Porsche 911">
                        </div>
                        <div class="specs">
                            <span><b>211</b> MPH</span>
                            <span><b>340</b> KMPH</span>
                            <span><b>392</b> KW</span>
                            <a href="https://www.porsche.com" class="discover-btn">
                                Discover Now <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
                <!-- 2nd car-->
                <div class="swiper-slide">
                    <div class="red"></div>
                    <div class="black"></div>
                    <div class="decagon decagon-black">
                        <a href="videos/video-2.mp4" target="_blank" class="play-btn play-darkred">
                            <i class="fas fa-play"></i>
                        </a>
                    </div>
                    <div class="content">
                        <div class="title">
                            <div class="small">Let's</div>
                            <div class="big">RACE</div>
                        </div>
                        <div class="image">
                            <img src="images/img-2.png" alt="Audi R8">
                        </div>
                        <div class="specs red-c">
                            <span><b>205</b> MPH</span>
                            <span><b>330</b> KMPH</span>
                            <span><b>462</b> KW</span>
                            <a href="https://www.audi.com" class="discover-btn red-c">
                                Discover Now <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
                <!-- 3rd car-->
                <div class="swiper-slide">
                    <div class="blue"></div>
                    <div class="black"></div>
                    <div class="decagon decagon-black">
                        <a href="videos/video-3.mp4" target="_blank" class="play-btn play-blue">
                            <i class="fas fa-play"></i>
                        </a>
                    </div>
                    <div class="content">
                        <div class="title">
                            <div class="small">Let's</div>
                            <div class="big">RACE</div>
                        </div>
                        <div class="image">
                            <img src="images/img-3.png" alt="Ferrari">
                        </div>
                        <div class="specs blue-c">
                            <span><b>218</b> MPH</span>
                            <span><b>351</b> KMPH</span>
                            <span><b>895</b> KW</span>
                            <a href="https://www.ferrari.com" class="discover-btn blue-c">
                                Discover Now <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
</body>

</html>
